server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: payment-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/V1/payments/**

        - id: audit-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/V1/audit/**
  data:
    redis:
      host: localhost
      port: 6379

payment:
  service:
    url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.payment_processing_platform: DEBUG